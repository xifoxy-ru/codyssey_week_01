<!doctype html>
<html lang="ko">
<head>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;

      padding: 2px 6px;
      border-radius: 6px;
    }

<body>
  <div class="box">
    <h1>Custom NGINX Container</h1>

    <p>과제 항목:</p>
    <ul>
      <li>Dockerfile 기반 커스텀 이미지 제작</li>
      <li>포트 매핑 검증</li>
